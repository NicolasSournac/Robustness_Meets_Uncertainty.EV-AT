defaults:
  - model: wideresnet_34_10
  - proxy: wideresnet_34_10_proxy
  - loss: cross_entropy
  - optimizer: sgd_rice
  - proxy_optimizer: sgd_proxy_awp
  - scheduler: multistep_lr_extended
  - trainer: standard
  - uncertainty_score: entropy
  - attacks: pgd_8_10
  - callbacks:
    - model_checkpoint
  - _self_

dataloaders:
    batch_size: 128
    num_workers: 8
    aug: basic

experiment:
  name: ???
  dataset: cifar10
  num_classes: 10
  seed: 1
  max_epochs: 200
  env_file: ./.env.example
  norm: Linf
  training_pipe: trades
  model_type: base
  beta: 6.0
  epsilon: ${eval:8/255}
  num_steps: 10
  step_size: ${eval:2/255}
  awp_warmup: 10
  awp_gamma: 0.005



step: train
output_dir: ${oc.env:EXP_PATH}/${experiment.name}/${model.name}/s${experiment.seed}

hydra:
  run:
    dir: ./logs/hydra/${experiment.name}/${model.name}/s${experiment.seed}/${step}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ./logs/hydra/multirun/${experiment.name}/${model.name}/s${experiment.seed}/${step}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
  verbose: false

